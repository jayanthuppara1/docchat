<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DocChat</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    #chat { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: auto; margin-top: 20px; }
    .msg-user { color: #333; margin: 8px 0; }
    .msg-assistant { color: #0a5; margin: 8px 0; }
    #status { color: #888; font-size: 14px; }
  </style>
</head>
<body>
  <h1>DocChat</h1>
  <p>Upload a PDF, get a summary, and ask questions about it.</p>

  <input type="file" id="fileInput" accept=".pdf">
  <button id="uploadBtn">Upload</button>
  <p id="status"></p>

  <button id="summaryBtn" disabled>Get Summary</button>
  <div id="summary"></div>

  <div id="chat"></div>
  <input type="text" id="chatInput" placeholder="Ask a question..." disabled>
  <button id="sendBtn" disabled>Send</button>

  <script src="app.js"></script>
</body>
</html>
